# NGINX configuration for Traiding
# Copy to: /etc/nginx/sites-available/traiding
# Enable: sudo ln -s /etc/nginx/sites-available/traiding /etc/nginx/sites-enabled/
# Domain: trading.zitrapps.com

upstream traiding_backend {
    server 127.0.0.1:8000 fail_timeout=0;
}

server {
    listen 80;
    server_name trading.zitrapps.com www.trading.zitrapps.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name trading.zitrapps.com www.trading.zitrapps.com;

    # SSL (Let's Encrypt - run: certbot --nginx -d trading.zitrapps.com)
    ssl_certificate /etc/letsencrypt/live/trading.zitrapps.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trading.zitrapps.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    access_log /var/log/nginx/traiding-access.log;
    error_log /var/log/nginx/traiding-error.log;

    client_max_body_size 20M;

    # API → Gunicorn
    location /api/ {
        proxy_pass http://traiding_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Django static
    location /static/ {
        alias /var/www/traiding/backend/staticfiles/;
    }

    # Media uploads
    location /media/ {
        alias /var/www/traiding/backend/media/;
    }

    # Frontend (React SPA)
    location / {
        root /var/www/traiding/static/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
